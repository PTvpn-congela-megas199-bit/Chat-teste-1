<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Real-Time</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f2f5; }
        #listaDeMensagens { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; }
        #listaDeMensagens li { background: white; margin-bottom: 8px; padding: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { display: flex; padding: 10px; background: white; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <ul id="listaDeMensagens"></ul>
    
    <div class="input-area">
        <input type="text" id="mensagem" placeholder="Digite uma mensagem...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        // --- COPIE SEU FIREBASE CONFIG AQUI ---
        const firebaseConfig = {
            apiKey: "AIzaSyCfMaQ2N5b8KHdAjX11tXVc3kakNQkVhMg",
            authDomain: "base-de-dados-8060d.firebaseapp.com",
            projectId: "base-de-dados-8060d",
            storageBucket: "base-de-dados-8060d.firebasestorage.app",
            messagingSenderId: "91146907783",
            appId: "1:91146907783:web:e7b28d3282152d19184822",
            measurementId: "G-9RCRL2V12Q"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Enviar
        function enviarMensagem() {
            const input = document.getElementById('mensagem');
            if (input.value.trim() === "") return;
            
            db.collection("mensagens").add({
                texto: input.value,
                data: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }

        // Receber em tempo real
        db.collection("mensagens").orderBy("data").onSnapshot((snapshot) => {
            const lista = document.getElementById('listaDeMensagens');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                lista.innerHTML += `<li>${doc.data().texto}</li>`;
            });
            // Rola para o final da conversa
            lista.scrollTop = lista.scrollHeight;
        });
    </script>
</body>
</html>
